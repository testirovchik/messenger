spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    driver-class-name: org.postgresql.Driver
    username: erik
    password: erik123*

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: change-this-to-a-random-256-bit-secret-key-in-production
  expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    export:
      prometheus:
        prometheus: true
  tracing:
    sampling:
      probability: 1.0 # Trace 100% of requests
  zipkin:
    tracing:
      endpoint: http://zipkin-service:9411/api/v2/spans