springdoc:
  swagger-ui:
    urls:
      - name: Chat Service
        url: /v3/api-docs
      - name: Auth Service
        url: http://localhost:8080/v3/api-docs
management:

  endpoints:
    web:
      exposure:
        include: health,prometheus
  tracing:
    enabled: false
    sampling:
      probability: 1.0 # Trace 100% of requests
  zipkin:
    tracing:
      endpoint: http://zipkin-service:9411/api/v2/spans
  endpoint:
    health:
      show-details: always # Shows database and disk health, not just "UP"
  metrics:
    tags:
      application: ${spring.application.name} # Tags all metrics with "messenger"
    export:
      prometheus:
        prometheus: true
server:
  port: 8081
spring:
  application:
    name: messenger
  kafka:
    producer:
      acks: all
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5433/chatdb
    driver-class-name: org.postgresql.Driver
    username: erik
    password: erik123*
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: change-this-to-a-random-256-bit-secret-key-in-production
  expiration-ms: 86400000
aws:
  s3:
    endpoint: http://localhost:4566
    region: us-east-1
    bucket: chat-images
    access-key: test
    secret-key: test