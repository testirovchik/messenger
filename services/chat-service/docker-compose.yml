version: '3.8'

services:

  # 1. Auth Database
  auth-postgres:
    image: postgres:15-alpine
    container_name: auth-postgres
    ports:
      - "5432:5432" # Your laptop connects via 5432
    environment:
      POSTGRES_USER: erik
      POSTGRES_PASSWORD: erik123*
      POSTGRES_DB: authdb

  # 2. Chat Database
  chat-postgres:
    image: postgres:15-alpine
    container_name: chat-postgres
    ports:
      - "5433:5432" # Your laptop connects via 5433
    environment:
      POSTGRES_USER: erik
      POSTGRES_PASSWORD: erik123*
      POSTGRES_DB: chatdb

  # 3. Redis (Remains the same)
  redis:
    image: redis:7-alpine
    container_name: messenger-redis
    ports:
      - "6379:6379"

  # 4. Kafka (Remains the same)
  kafka:
    image: apache/kafka:latest
    container_name: messenger-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1