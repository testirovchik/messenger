services:
  # 1. Auth Database
  auth-postgres:
    image: postgres:15-alpine
    container_name: auth-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: erik
      POSTGRES_PASSWORD: erik123*
      POSTGRES_DB: authdb

  # 2. Chat Database
  chat-postgres:
    image: postgres:15-alpine
    container_name: chat-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: erik
      POSTGRES_PASSWORD: erik123*
      POSTGRES_DB: chatdb

  # 3. Redis
  redis:
    image: redis:7-alpine
    container_name: messenger-redis
    ports:
      - "6379:6379"

  # 4. Kafka
  kafka:
    image: apache/kafka:latest
    container_name: messenger-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  # 5. Auth Microservice
  auth-service:
    build: ../auth-service
    container_name: auth-service
    ports:
      - "8080:8080"
    depends_on:
      - auth-postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/authdb

  # 6. Chat Microservice
  chat-service:
    build: .
    container_name: chat-service
    ports:
      - "8081:8081"
    depends_on:
      chat-postgres:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
      localstack:
        condition: service_healthy   # ← waits for healthcheck to pass
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://chat-postgres:5432/chatdb
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_S3_ENDPOINT: http://localstack:4566
      AWS_ENDPOINT_URL_S3: http://localstack:4566

  # 7. Notifier Microservice
  notifier-service:
    build: ../notifier
    container_name: notifier-service
    ports:
      - "8083:8083"
    depends_on:
      - redis
      - kafka
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS: kafka:29092

  # 8. LocalStack
  localstack:
    container_name: localstack
    image: localstack/localstack:3   # ← community edition, pinned to v3
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - DEBUG=1
      - PERSISTENCE=1
      - SERVICES=s3
    volumes:
      - localstack_data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4566/_localstack/health" ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

volumes:
  localstack_data: