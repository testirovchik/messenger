apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3      # stable community tag
          ports:
            - containerPort: 4566
          env:
            - name: SERVICES
              value: "s3"
            - name: ACTIVATE_PRO
              value: "0"
            - name: DEBUG
              value: "1"
            - name: HOSTNAME_EXTERNAL
              value: "localstack"
            - name: GATEWAY_LISTEN
              value: "0.0.0.0:4566"
          livenessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
spec:
  selector:
    app: localstack
  ports:
    - port: 4566
      targetPort: 4566