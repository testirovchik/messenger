# ==========================================
# 1. PROMETHEUS (Metrics)
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'messenger-microservices'
        metrics_path: '/actuator/prometheus'
        static_configs:
          # Use the absolute full DNS names!
          - targets: [
              'auth-service.default.svc.cluster.local:8080', 
              'chat-service.default.svc.cluster.local:8081', 
              'notifier-service.default.svc.cluster.local:8083'
            ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090

# ==========================================
# 2. JAEGER (Traces)
# NOTE: This also replaces 07-tracing.yaml entirely.
# Jaeger natively speaks the Zipkin protocol on port 9411,
# so we do NOT need a separate standalone Zipkin deployment.
# The service is still called "zipkin-service" so that the
# Ingress rule in 06-ingress.yaml continues to work unchanged.
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          env:
            - name: COLLECTOR_ZIPKIN_HOST_PORT
              value: ":9411"
          ports:
            - containerPort: 16686  # Jaeger UI
            - containerPort: 9411   # Zipkin-compatible ingestion
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin-service
spec:
  selector:
    app: jaeger
  ports:
    - name: ingestion   # Spring Boot apps send traces here
      port: 9411
    - name: ui          # Ingress exposes this for tracing.messenger.local
      port: 16686

# ==========================================
# 3. GRAFANA DATASOURCES
# FIX: Without this ConfigMap + volume mount below, Grafana starts
# completely blank and loses all manually added data sources every
# time the pod restarts. This provisions Prometheus, Loki, and
# Jaeger automatically on every startup.
# ==========================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-service:9090
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        url: http://loki-service:3100
        editable: true
      - name: Jaeger
        type: jaeger
        url: http://zipkin-service:16686
        editable: true

# ==========================================
# 4. GRAFANA (UI)
# FIX: Added volumeMounts and volumes to mount the datasources
# ConfigMap above into Grafana's provisioning directory.
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          # FIX: Mount the datasource ConfigMap so Grafana auto-provisions
          # Prometheus, Loki, and Jaeger on every startup.
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
