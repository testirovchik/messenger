# ==========================================
# 1. LOKI (Log Database)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.2
          ports:
            - containerPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: loki-service
spec:
  selector:
    app: loki
  ports:
    - port: 3100

# ==========================================
# 2. PROMTAIL (Log Collector)
# ==========================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-rolebinding
subjects:
  - kind: ServiceAccount
    name: promtail-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: promtail-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    
    clients:
      - url: http://loki-service:3100/loki/api/v1/push
    
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Carry the app label through so you can filter by app in Grafana
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
    
          # Useful extra labels for filtering in Loki
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
    
          # FIX: The original config joined 4 labels with separator "/" then
          # tried to reference them as $1/$2/$3/$4 capture groups, but those
          # are regex capture groups — not positional labels. With no regex
          # defined, every capture group is empty, producing the path
          # "/var/log/pods//*.log" which matches nothing.
          #
          # CORRECT approach: join only pod_uid and container_name with "/".
          # Use a wildcard glob (*$1*) to match the full directory name which
          # Kubernetes formats as "<namespace>_<pod-name>_<uid>". We only need
          # the UID suffix to uniquely identify it, so the glob handles the rest.
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1*/$2/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail-sa
      containers:
        - name: promtail
          image: grafana/promtail:2.9.2
          securityContext:
            runAsUser: 0
            privileged: true
          args:
            - -config.file=/etc/promtail/promtail.yaml
          volumeMounts:
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: promtail-config
              mountPath: /etc/promtail/promtail.yaml
              subPath: promtail.yaml
      volumes:
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
        - name: promtail-config
          configMap:
            name: promtail-config
